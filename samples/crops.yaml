crops:
  maize:
    name: "maize"
    thermal_time:
      base_temp_c: 8.0
      emergence_dd: 100
      flowering_dd: 900
      maturity_dd: 1700
    roots:
      max_depth_cm: 180
      growth_rate_cm_per_day: 2.5
      distribution: [0.5, 0.3, 0.2]
    biomass:
      rue_g_per_mj: 3.0
      harvest_index: 0.5
      partition_vegetative: {leaf: 0.6, stem: 0.2, root: 0.2}
      partition_reproductive: {leaf: 0.2, stem: 0.2, grain: 0.6}
