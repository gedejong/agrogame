# Crop parameter presets
# Sources: DSSAT CERES, APSIM, WOFOST/PCSE, FAO-56
crops:
  maize:
    name: "Maize (Zea mays)"
    # Tissue nutrient concentrations (kg nutrient / kg DM).
    # DSSAT CERES-Maize: whole-plant N 2.5-3.5%; P ~0.3%
    tissue_n_conc_kg_kg: 0.030
    tissue_p_conc_kg_kg: 0.003
    # Whole-shoot critical-N dilution N_crit% = 3.40*W^-0.37 (#360)
    # Plénet & Lemaire (2000) Plant & Soil 216:65-82 (orig. 1999).
    n_crit_a: 3.40
    n_crit_b: 0.37
    phenology:
      base_temperature_c: 8.0
      max_temperature_c: 35.0
      emergence_gdd: 100.0
      flowering_gdd: 759.0       # NL posterior (AGRO-92)
      maturity_gdd: 1830.0       # NL posterior (AGRO-92)
    canopy:
      extinction_coefficient_k: 0.54  # Stable across climates (AGRO-102)
      rue_g_per_mj: 3.56        # NL posterior (AGRO-92)
      sla_m2_per_g: 0.02        # Default — NL posterior hit prior bound
      lai_max: 6.0
      senescence_rate_per_day: 0.01
      temp_base_c: 8.0
      temp_opt_c: 26.4          # NL posterior (AGRO-92)
      temp_max_c: 42.0
      leaf_fraction_vegetative: 0.7
      leaf_fraction_flowering: 0.4
      leaf_fraction_grain_fill: 0.15
      harvest_index: 0.50          # DSSAT CERES-Maize: 0.45-0.55 (legacy fallback)
      # Sink-source grain model (#321): grain number from silking-window
      # growth (Andrade et al. 1999), then kernel fill. Kernel ~250-300 mg.
      grains_per_g_source: 6.0
      grain_set_window_gdd: 200.0
      potential_kernel_weight_mg: 290.0
      kernel_fill_rate_mg_per_grain_day: 9.0
      hi_max: 0.55                  # CERES-Maize HI ceiling
      remobilization_fraction: 0.037  # NL posterior (AGRO-92)
      frost_threshold_c: 0.0        # DSSAT: maize killed at 0C
      frost_damage_fraction: 0.4
      heat_damage_threshold_c: 35.0  # Hatfield & Prueger 2015
      heat_grain_reduction_fraction: 0.5
      waterlog_days_for_damage: 3
      waterlog_lai_loss_fraction: 0.15
    climate_overrides:
      kenya_highlands:
        canopy:
          rue_g_per_mj: 2.53      # Kenya posterior (AGRO-102)
          temp_opt_c: 24.2        # Kenya posterior (AGRO-102)
          sla_m2_per_g: 0.013     # Kenya posterior (AGRO-102)
        phenology:
          flowering_gdd: 777.0    # Kenya posterior (AGRO-102)
          maturity_gdd: 1801.0    # Kenya posterior (AGRO-102)
      sahel_arid:
        canopy:
          rue_g_per_mj: 2.94      # Sahel posterior (AGRO-102)
          temp_opt_c: 33.9        # Sahel posterior (AGRO-102)
          sla_m2_per_g: 0.018     # Sahel posterior (AGRO-102)
        phenology:
          flowering_gdd: 1130.0   # Sahel posterior (AGRO-102)
          maturity_gdd: 1654.0    # Sahel posterior (AGRO-102)
    roots:
      max_depth_cm: 150.0
      growth_rate_cm_per_day: 2.0
      distribution: exponential
      root_allocation_fraction: 0.18   # CERES-Maize seasonal root:shoot

  winter_wheat:
    name: "Winter Wheat (Triticum aestivum)"
    # APSIM-Wheat: whole-plant N ~2.0-2.5%; P ~0.3%
    tissue_n_conc_kg_kg: 0.025
    tissue_p_conc_kg_kg: 0.003
    # Whole-shoot critical-N dilution N_crit% = 5.35*W^-0.442 (#360)
    # Justes et al. (1994) Ann. Bot. 74:397-407.
    n_crit_a: 5.35
    n_crit_b: 0.442
    phenology:
      base_temperature_c: 0.0
      max_temperature_c: 30.0
      emergence_gdd: 100.0
      flowering_gdd: 900.0       # May in NL (AHDB/APSIM: 800-1100)
      maturity_gdd: 1800.0       # July in NL (intermediate; full APSIM: 2000-2500)
      vernalization_required_units: 40.0
    canopy:
      extinction_coefficient_k: 0.55
      rue_g_per_mj: 2.5        # APSIM wheat typical
      sla_m2_per_g: 0.022
      lai_max: 7.0
      senescence_rate_per_day: 0.008
      temp_base_c: 0.0
      temp_opt_c: 16.0         # C3 crop, European varieties optimum 15-18C
      temp_max_c: 32.0
      initial_lai_at_emergence: 0.3   # winter cereals establish rosette
      senescence_vegetative_fraction: 0.05  # minimal leaf loss before flowering
      stress_memory_days: 14        # longer averaging window for deep-rooted crop
      wilt_stress_threshold: 0.15   # deep-rooted wheat tolerates transient dry spells
      wilt_days_for_damage: 10      # extended tolerance before irreversible damage
      leaf_fraction_vegetative: 0.75  # high leaf allocation during tillering
      leaf_fraction_flowering: 0.35   # stem elongation dominates
      leaf_fraction_grain_fill: 0.10  # most assimilate to grain/stem
      senescence_flowering_fraction: 0.3  # lower canopy leaves start dying
      senescence_grain_fill_max: 1.8  # gradual canopy decline
      grain_fill_duration_gdd: 900.0
      harvest_index: 0.45          # APSIM wheat: 0.40-0.50 (legacy fallback)
      # Sink-source grain model (#321): grains from spike growth around
      # anthesis (Fischer 1985), kernel ~40-45 mg (Gebbing & Schnyder 1999).
      grains_per_g_source: 95.0
      grain_set_window_gdd: 250.0
      potential_kernel_weight_mg: 42.0
      kernel_fill_rate_mg_per_grain_day: 1.5
      hi_max: 0.55                  # field winter-wheat HI ceiling (safety)
      remobilization_fraction: 0.08  # stem reserves (Gebbing & Schnyder 1999)
      leaf_remob_fraction: 0.03      # senescing-leaf protein/C to grain (#321)
      frost_threshold_c: -2.0       # Winter wheat tolerates mild frost
      frost_damage_fraction: 0.2
      heat_damage_threshold_c: 32.0  # C3 crop, sensitive to heat
      heat_grain_reduction_fraction: 0.6
      waterlog_days_for_damage: 4    # Deeper roots, more tolerant
      waterlog_lai_loss_fraction: 0.1
    roots:
      max_depth_cm: 120.0
      growth_rate_cm_per_day: 1.5
      distribution: exponential
      root_allocation_fraction: 0.22   # APSIM-Wheat root:shoot

  spring_wheat:
    name: "Spring Wheat (Triticum aestivum)"
    tissue_n_conc_kg_kg: 0.025
    tissue_p_conc_kg_kg: 0.003
    # Whole-shoot critical-N dilution N_crit% = 5.35*W^-0.442 (#360)
    # Justes et al. (1994) Ann. Bot. 74:397-407.
    n_crit_a: 5.35
    n_crit_b: 0.442
    phenology:
      base_temperature_c: 0.0
      max_temperature_c: 30.0
      emergence_gdd: 80.0
      flowering_gdd: 600.0      # shorter cycle than winter wheat
      maturity_gdd: 1300.0      # matures faster
    canopy:
      extinction_coefficient_k: 0.55
      rue_g_per_mj: 2.3        # slightly lower than winter wheat
      sla_m2_per_g: 0.022
      lai_max: 6.0             # lower peak LAI
      senescence_rate_per_day: 0.008
      temp_base_c: 0.0
      temp_opt_c: 18.0         # spring varieties tolerate slightly warmer
      temp_max_c: 32.0
      leaf_fraction_vegetative: 0.7
      leaf_fraction_flowering: 0.35
      leaf_fraction_grain_fill: 0.10
      grain_fill_duration_gdd: 700.0
      harvest_index: 0.45          # spring wheat similar to winter (legacy fallback)
      # Sink-source grain model (#321): as winter wheat (Fischer 1985).
      grains_per_g_source: 110.0
      grain_set_window_gdd: 200.0
      potential_kernel_weight_mg: 42.0
      kernel_fill_rate_mg_per_grain_day: 1.5
      hi_max: 0.50
      remobilization_fraction: 0.06
      leaf_remob_fraction: 0.02      # senescing-leaf protein/C to grain (#321)
      frost_threshold_c: -1.0       # Spring wheat less frost-hardy
      frost_damage_fraction: 0.25
      heat_damage_threshold_c: 32.0
      heat_grain_reduction_fraction: 0.6
      waterlog_days_for_damage: 3
      waterlog_lai_loss_fraction: 0.12
    roots:
      max_depth_cm: 100.0      # shallower than winter wheat
      growth_rate_cm_per_day: 1.5
      distribution: exponential
      root_allocation_fraction: 0.22   # APSIM-Wheat root:shoot

  rice:
    name: "Rice (Oryza sativa)"
    # DSSAT CERES-Rice: whole-plant N ~2.0-2.5%; P ~0.25%
    tissue_n_conc_kg_kg: 0.022
    tissue_p_conc_kg_kg: 0.0025
    phenology:
      base_temperature_c: 10.0
      max_temperature_c: 40.0
      emergence_gdd: 80.0
      flowering_gdd: 800.0
      maturity_gdd: 1400.0
      photoperiod_sensitivity: 0.3
    canopy:
      extinction_coefficient_k: 0.6
      rue_g_per_mj: 2.8        # DSSAT CERES-Rice
      sla_m2_per_g: 0.024
      lai_max: 8.0
      senescence_rate_per_day: 0.008
      temp_base_c: 10.0
      temp_opt_c: 28.0
      temp_max_c: 40.0
      leaf_fraction_vegetative: 0.7
      leaf_fraction_flowering: 0.45
      leaf_fraction_grain_fill: 0.15
      harvest_index: 0.45          # DSSAT CERES-Rice: 0.40-0.50 (legacy fallback)
      # Sink-source grain model (#321): panicle grain set, kernel ~22-27 mg.
      grains_per_g_source: 200.0
      grain_set_window_gdd: 250.0
      potential_kernel_weight_mg: 25.0
      kernel_fill_rate_mg_per_grain_day: 1.0
      hi_max: 0.50
      remobilization_fraction: 0.02
      frost_threshold_c: 10.0      # Tropical crop, very frost-sensitive
      frost_damage_fraction: 0.5
      heat_damage_threshold_c: 38.0  # Adapted to heat
      heat_grain_reduction_fraction: 0.4
      waterlog_days_for_damage: 7    # Paddy rice tolerates flooding
      waterlog_lai_loss_fraction: 0.05
    roots:
      max_depth_cm: 60.0       # shallow-rooted
      growth_rate_cm_per_day: 1.0
      distribution: uniform
      root_allocation_fraction: 0.15   # CERES-Rice (lowland, low root:shoot)

  sorghum:
    name: "Sorghum (Sorghum bicolor)"
    # DSSAT CERES-Sorghum: whole-plant N ~2.5%; P ~0.3%
    tissue_n_conc_kg_kg: 0.025
    tissue_p_conc_kg_kg: 0.003
    phenology:
      base_temperature_c: 10.0
      max_temperature_c: 40.0
      emergence_gdd: 80.0
      flowering_gdd: 1156.0      # Bayesian posterior — Sahel (AGRO-102)
      maturity_gdd: 1770.0       # Bayesian posterior — Sahel (AGRO-102)
    canopy:
      extinction_coefficient_k: 0.61  # Bayesian posterior (AGRO-102)
      rue_g_per_mj: 3.38        # Bayesian posterior — Sahel (AGRO-102)
      sla_m2_per_g: 0.017       # Bayesian posterior (AGRO-102)
      lai_max: 5.0
      senescence_rate_per_day: 0.01
      temp_base_c: 10.0
      temp_opt_c: 33.8          # Bayesian posterior — Sahel (AGRO-102)
      temp_max_c: 45.0
      leaf_fraction_vegetative: 0.65
      leaf_fraction_flowering: 0.35
      leaf_fraction_grain_fill: 0.10
      harvest_index: 0.35          # APSIM sorghum: 0.30-0.40 (legacy fallback)
      # Sink-source grain model (#321): panicle grain set, kernel ~25-30 mg.
      grains_per_g_source: 120.0
      grain_set_window_gdd: 200.0
      potential_kernel_weight_mg: 28.0
      kernel_fill_rate_mg_per_grain_day: 1.2
      hi_max: 0.45                  # APSIM sorghum HI ceiling
      remobilization_fraction: 0.029  # Bayesian posterior (AGRO-102)
      frost_threshold_c: 2.0       # Tropical C4, frost-sensitive
      frost_damage_fraction: 0.4
      heat_damage_threshold_c: 38.0  # Heat-adapted C4
      heat_grain_reduction_fraction: 0.3
      waterlog_days_for_damage: 3
      waterlog_lai_loss_fraction: 0.15
    roots:
      max_depth_cm: 180.0      # deep-rooted, drought-adapted
      growth_rate_cm_per_day: 2.5
      distribution: exponential
      root_allocation_fraction: 0.25   # drought-adapted, high root investment

  soybean:
    name: "Soybean (Glycine max)"
    n_fixation_credit_kg_ha: 60.0  # Peoples et al. (2009): 40-80 kg N/ha
    # Legumes: higher N from fixation, tissue N ~4-5%; P ~0.3%
    tissue_n_conc_kg_kg: 0.045
    tissue_p_conc_kg_kg: 0.003
    phenology:
      base_temperature_c: 10.0
      max_temperature_c: 40.0
      emergence_gdd: 80.0
      flowering_gdd: 700.0
      maturity_gdd: 1400.0
    canopy:
      extinction_coefficient_k: 0.55
      rue_g_per_mj: 2.0        # C3 legume, moderate RUE
      sla_m2_per_g: 0.022
      lai_max: 5.0
      senescence_rate_per_day: 0.012
      temp_base_c: 10.0
      temp_opt_c: 28.0
      temp_max_c: 40.0
      leaf_fraction_vegetative: 0.65
      leaf_fraction_flowering: 0.35
      leaf_fraction_grain_fill: 0.10
      harvest_index: 0.40          # DSSAT CROPGRO-Soybean: 0.35-0.45
      remobilization_fraction: 0.02
      frost_threshold_c: 0.0
      frost_damage_fraction: 0.35
      heat_damage_threshold_c: 35.0
      heat_grain_reduction_fraction: 0.5
      waterlog_days_for_damage: 2    # Soybean sensitive to waterlogging
      waterlog_lai_loss_fraction: 0.2
    roots:
      max_depth_cm: 120.0
      growth_rate_cm_per_day: 1.5
      distribution: exponential
      root_allocation_fraction: 0.20   # legume, N-fixing nodulated roots

  grape:
    name: "Grape (Vitis vinifera)"
    # Perennial vine: lower tissue N ~1.5-2.0%; P ~0.2%
    tissue_n_conc_kg_kg: 0.018
    tissue_p_conc_kg_kg: 0.002
    phenology:
      base_temperature_c: 10.0
      max_temperature_c: 35.0
      emergence_gdd: 50.0      # bud break
      flowering_gdd: 400.0
      maturity_gdd: 1800.0     # long season to harvest
    canopy:
      extinction_coefficient_k: 0.45   # open canopy, trained vines
      rue_g_per_mj: 1.5        # perennial, lower RUE than cereals
      sla_m2_per_g: 0.015
      lai_max: 4.0
      senescence_rate_per_day: 0.005
      temp_base_c: 10.0
      temp_opt_c: 25.0         # Mediterranean optimum
      temp_max_c: 35.0
      leaf_fraction_vegetative: 0.8
      leaf_fraction_flowering: 0.5
      leaf_fraction_grain_fill: 0.3   # perennial, keeps producing leaves
      harvest_index: 0.0           # grape: fruit yield modeled separately
      frost_threshold_c: -5.0      # Dormant vines tolerate cold
      frost_damage_fraction: 0.2
      heat_damage_threshold_c: 38.0
      heat_grain_reduction_fraction: 0.3
      waterlog_days_for_damage: 4
      waterlog_lai_loss_fraction: 0.1
    roots:
      max_depth_cm: 200.0      # very deep-rooted perennial
      growth_rate_cm_per_day: 0.8
      distribution: exponential
      root_allocation_fraction: 0.30   # perennial vine, high root investment
