repos:
  - repo: https://github.com/psf/black
    rev: "24.10.0"
    hooks:
      - id: black
        args: ["--line-length=88"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pycqa/flake8
    rev: "6.1.0"
    hooks:
      - id: flake8

  # Use project virtualenv for mypy to pick up installed stubs and config
  - repo: local
    hooks:
      - id: mypy-project
        name: mypy (project)
        entry: poetry run mypy agrogame
        language: system
        pass_filenames: false
        files: ^agrogame/
        stages: [push]

  - repo: local
    hooks:
      - id: xenon-check
        name: xenon complexity (manual)
        entry: poetry run xenon --max-average B --max-modules B --max-absolute C --ignore 'tests/*,docs/*,out/*' agrogame
        language: system
        pass_filenames: false
        stages: [manual]

  - repo: local
    hooks:
      - id: importlinter-check
        name: import-linter contracts (manual)
        entry: poetry run lint-imports --config .importlinter
        language: system
        pass_filenames: false
        stages: [manual]

  - repo: https://github.com/fpgmaas/deptry
    rev: "0.20.0"
    hooks:
      - id: deptry
        args: ["--exclude","tests,docs,build,dist,out,.cache"]
        stages: [manual]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.11
    hooks:
      - id: vulture
        args: ["--min-confidence","80","agrogame"]
        stages: [manual]

  - repo: local
    hooks:
      - id: defensive-coding
        name: defensive coding checks
        entry: poetry run python scripts/check_defensive_coding.py agrogame
        language: system
        pass_filenames: false
        stages: [push]
  - repo: local
    hooks:
      - id: pytest-with-cov
        name: pytest with coverage
        entry: poetry run pytest --maxfail=1 --disable-warnings
        language: system
        pass_filenames: false
        stages: [push]
      - id: ruff-docstrings-water
        name: ruff docstrings (water package)
        entry: poetry run ruff check agrogame/soil/water --select D
        language: system
        pass_filenames: false
  - repo: local
    hooks:
      - id: bench-pre-push
        name: benchmark suite (AGRO_BENCH=1)
        entry: bash -c 'AGRO_BENCH=1 poetry run pytest -q -k benchmarks --no-cov || exit 1'
        language: system
        pass_filenames: false
        stages: [push]

  # GDScript quality (Godot game client)
  - repo: local
    hooks:
      - id: gdlint
        name: gdlint (GDScript)
        entry: gdlint
        language: system
        files: '\.gd$'
      - id: gdformat-check
        name: gdformat (GDScript)
        entry: gdformat --check
        language: system
        files: '\.gd$'
