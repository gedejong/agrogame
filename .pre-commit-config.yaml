repos:
  - repo: https://github.com/psf/black
    rev: "24.10.0"
    hooks:
      - id: black
        args: ["--line-length=88"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pycqa/flake8
    rev: "6.1.0"
    hooks:
      - id: flake8

  - repo: local
    hooks:
      - id: ruff-docstrings-water
        name: ruff docstrings (water package)
        entry: poetry run ruff check agrogame/soil/water --select D
        language: system
        pass_filenames: false

  # GDScript quality — skips gracefully if gdtoolkit not installed
  - repo: local
    hooks:
      - id: gdlint
        name: gdlint (GDScript)
        entry: bash -c 'command -v gdlint >/dev/null && gdlint "$@" || true' --
        language: system
        files: '\.gd$'
      - id: gdformat-check
        name: gdformat (GDScript)
        entry: bash -c 'command -v gdformat >/dev/null && gdformat --check "$@" || true' --
        language: system
        files: '\.gd$'
      - id: gdscript-coverage
        name: GDScript file coverage (100%)
        entry: bash game/tests/check_coverage.sh 100
        language: system
        pass_filenames: false
        files: '\.gd$'

  # --- Heavy checks: manual stage only (run via `pre-commit run --hook-stage manual`) ---
  - repo: local
    hooks:
      - id: mypy-project
        name: mypy (project)
        entry: poetry run mypy agrogame
        language: system
        pass_filenames: false
        files: ^agrogame/
        stages: [manual]
      - id: xenon-check
        name: xenon complexity
        entry: poetry run xenon --max-average B --max-modules B --max-absolute C --ignore 'tests/*,docs/*,out/*' agrogame
        language: system
        pass_filenames: false
        stages: [manual]
      - id: importlinter-check
        name: import-linter contracts
        entry: poetry run lint-imports --config .importlinter
        language: system
        pass_filenames: false
        stages: [manual]
      - id: defensive-coding
        name: defensive coding checks
        entry: poetry run python scripts/check_defensive_coding.py agrogame
        language: system
        pass_filenames: false
        stages: [manual]
      - id: pytest-with-cov
        name: pytest with coverage
        entry: poetry run pytest --maxfail=1 --disable-warnings
        language: system
        pass_filenames: false
        stages: [manual]
      - id: bench-pre-push
        name: benchmark suite (AGRO_BENCH=1)
        entry: bash -c 'AGRO_BENCH=1 poetry run pytest -q -k benchmarks --no-cov || exit 1'
        language: system
        pass_filenames: false
        stages: [manual]
      - id: gut-tests
        name: GUT tests (GDScript)
        entry: bash -c 'command -v godot >/dev/null 2>&1 || { echo "godot not found, skipping GUT tests"; exit 0; }; cd game && godot --headless --script addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json'
        language: system
        pass_filenames: false
        stages: [manual]

  - repo: https://github.com/fpgmaas/deptry
    rev: "0.20.0"
    hooks:
      - id: deptry
        args: ["--exclude","tests,docs,build,dist,out,.cache"]
        stages: [manual]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.11
    hooks:
      - id: vulture
        args: ["--min-confidence","80","agrogame"]
        stages: [manual]
