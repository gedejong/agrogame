[tool.poetry]
name = "agrogame-simulation"
version = "0.1.0"
description = "Soil-plant-atmosphere simulation engine for farming game"
authors = ["Data Build Company <edwin.dejong@databuildcompany.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "agrogame" }]

[tool.poetry.dependencies]
python = "^3.9"
numpy = "^1.24"
pandas = "^2.0"
pydantic = "^2.0"
pyyaml = "^6.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.0"
pytest-cov = "^4.0"
black = "^23.0"
flake8 = "^6.0"
mypy = "^1.0"
pre-commit = "^3.0"

[tool.poetry.scripts]
simulate = "agrogame.cli:main"

[tool.black]
extend-exclude = "agrogame/cli.py"
line-length = 100
target-version = ["py39"]

[tool.flake8]
extend-exclude = ["agrogame/cli.py"]
max-line-length = 100
extend-ignore = ["E203", "W503"]

[tool.mypy]
python_version = "3.9"
warn_unused_ignores = true
warn_redundant_casts = true
strict = false
check_untyped_defs = true

[build-system]
requires = ["poetry-core>=2.0.0"]
build-backend = "poetry.core.masonry.api"
