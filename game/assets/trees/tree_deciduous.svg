<svg xmlns="http://www.w3.org/2000/svg" width="32" height="48" viewBox="0 0 32 48">
  <!-- Deciduous tree: ~38px tall, thick trunk, round canopy -->
  <!-- Cast shadow on ground -->
  <ellipse cx="19" cy="46" rx="7" ry="2.5" fill="#000000" opacity="0.14" transform="skewX(-15)"/>
  <!-- Trunk (thick, woody brown) -->
  <path d="M16,44 Q15.5,36 16,22" fill="none" stroke="#5a4535" stroke-width="3" stroke-linecap="round"/>
  <!-- Main branches (along iso axes) -->
  <path d="M16,28 Q11,24 8,25" fill="none" stroke="#5a4535" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16,26 Q21,22 24,23" fill="none" stroke="#5a4535" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16,24 Q13,20 10,21" fill="none" stroke="#5a4535" stroke-width="1" stroke-linecap="round"/>
  <!-- Canopy (overlapping rounded masses, muted green) -->
  <ellipse cx="9" cy="22" rx="5" ry="4" fill="#4a7a2a"/>
  <ellipse cx="23" cy="20" rx="5" ry="4" fill="#4a7a2a"/>
  <ellipse cx="16" cy="16" rx="7" ry="5.5" fill="#5a8a3a"/>
  <ellipse cx="12" cy="14" rx="5" ry="4" fill="#4a7a2a"/>
  <ellipse cx="20" cy="13" rx="5" ry="4" fill="#5a8a3a"/>
  <ellipse cx="16" cy="10" rx="6" ry="4.5" fill="#4a7a2a"/>
  <!-- Highlight on top-left canopy -->
  <ellipse cx="12" cy="11" rx="3" ry="2.5" fill="#6a9a4a" opacity="0.4"/>
  <ellipse cx="14" cy="8" rx="2.5" ry="2" fill="#6a9a4a" opacity="0.35"/>
</svg>
