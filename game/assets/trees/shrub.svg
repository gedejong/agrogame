<svg xmlns="http://www.w3.org/2000/svg" width="32" height="48" viewBox="0 0 32 48">
  <!-- Low bush/shrub: ~12px tall, no visible trunk, rounded green mound -->
  <!-- Cast shadow -->
  <ellipse cx="18" cy="46" rx="6" ry="2" fill="#000000" opacity="0.12" transform="skewX(-15)"/>
  <!-- Bush mass (overlapping rounded shapes, wider than tall) -->
  <ellipse cx="10" cy="40" rx="4.5" ry="3" fill="#4a7a2a"/>
  <ellipse cx="22" cy="39" rx="4.5" ry="3" fill="#4a7a2a"/>
  <ellipse cx="16" cy="38" rx="6" ry="4" fill="#5a8a3a"/>
  <ellipse cx="12" cy="36" rx="4" ry="3" fill="#4a7a2a"/>
  <ellipse cx="20" cy="36" rx="4" ry="3" fill="#5a8a3a"/>
  <ellipse cx="16" cy="35" rx="5" ry="3.5" fill="#4a7a2a"/>
  <!-- Wild texture (small bumps on surface) -->
  <g fill="#3a6a22" opacity="0.4">
    <circle cx="10" cy="37" r="1.2"/><circle cx="16" cy="34" r="1"/>
    <circle cx="22" cy="37" r="1.2"/><circle cx="14" cy="39" r="1"/>
    <circle cx="19" cy="35" r="0.9"/>
  </g>
  <!-- Highlight on top-left -->
  <ellipse cx="13" cy="35" rx="2.5" ry="1.8" fill="#6a9a4a" opacity="0.35"/>
</svg>
