<svg xmlns="http://www.w3.org/2000/svg" width="128" height="32" viewBox="0 0 128 32">
  <!-- Clay: dense, smooth, fine horizontal crack lines, compact -->
  <rect width="128" height="32" fill="#9a8b7a"/>
  <!-- Horizontal crack lines (fine, wrapping for tileability) -->
  <g stroke="#8a7b6a" stroke-width="0.5" fill="none" opacity="0.5">
    <path d="M0,8 Q10,7 20,8 Q30,9 40,8 Q50,7 60,8 Q70,9 80,8 Q90,7 100,8 Q110,9 120,8 L128,8"/>
    <path d="M0,18 Q8,17 18,18 Q28,19 38,18 Q48,17 58,18 Q68,19 78,18 Q88,17 98,18 Q108,19 118,18 L128,18"/>
    <path d="M0,26 Q12,25 24,26 Q36,27 48,26 Q60,25 72,26 Q84,27 96,26 Q108,25 120,26 L128,26"/>
  </g>
  <!-- Secondary cracks (shorter, vertical-ish) -->
  <g stroke="#7b6e5e" stroke-width="0.4" fill="none" opacity="0.35">
    <line x1="16" y1="5" x2="18" y2="12"/><line x1="42" y1="14" x2="40" y2="22"/>
    <line x1="68" y1="3" x2="70" y2="10"/><line x1="96" y1="15" x2="94" y2="24"/>
    <line x1="118" y1="6" x2="120" y2="14"/>
  </g>
  <!-- Subtle smooth sheen patches -->
  <g fill="#a89b8a" opacity="0.2">
    <ellipse cx="30" cy="12" rx="8" ry="4"/>
    <ellipse cx="80" cy="22" rx="7" ry="3.5"/>
    <ellipse cx="110" cy="8" rx="6" ry="3"/>
  </g>
</svg>
