<svg xmlns="http://www.w3.org/2000/svg" width="128" height="32" viewBox="0 0 128 32">
  <!-- Saturated clay: darkened, blue-grey shift -->
  <rect width="128" height="32" fill="#6b5f52"/>
  <!-- Crack lines (subdued — water fills cracks) -->
  <g stroke="#5b5042" stroke-width="0.4" fill="none" opacity="0.35">
    <path d="M0,8 Q10,7 20,8 Q30,9 40,8 Q50,7 60,8 Q70,9 80,8 Q90,7 100,8 Q110,9 120,8 L128,8"/>
    <path d="M0,18 Q8,17 18,18 Q28,19 38,18 Q48,17 58,18 Q68,19 78,18 Q88,17 98,18 Q108,19 118,18 L128,18"/>
    <path d="M0,26 Q12,25 24,26 Q36,27 48,26 Q60,25 72,26 Q84,27 96,26 Q108,25 120,26 L128,26"/>
  </g>
  <!-- Fewer vertical cracks (water softens clay) -->
  <g stroke="#5b5042" stroke-width="0.3" fill="none" opacity="0.25">
    <line x1="42" y1="14" x2="40" y2="22"/>
    <line x1="96" y1="15" x2="94" y2="24"/>
  </g>
  <!-- Blue-grey wet sheen -->
  <g fill="#7a8088" opacity="0.15">
    <ellipse cx="30" cy="12" rx="10" ry="5"/>
    <ellipse cx="80" cy="22" rx="9" ry="4"/>
    <ellipse cx="115" cy="10" rx="8" ry="4"/>
  </g>
</svg>
