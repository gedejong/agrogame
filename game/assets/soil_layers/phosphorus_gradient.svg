<svg xmlns="http://www.w3.org/2000/svg" width="128" height="32" viewBox="0 0 128 32">
  <!-- Phosphorus concentration overlay: purple tint concentrated at surface -->
  <!-- Top band (strongest — P is immobile, stays near surface) -->
  <rect x="0" y="0" width="128" height="6" fill="#7a4a8b" opacity="0.25"/>
  <!-- Second band (drops off sharply) -->
  <rect x="0" y="6" width="128" height="6" fill="#7a4a8b" opacity="0.12"/>
  <!-- Third band -->
  <rect x="0" y="12" width="128" height="8" fill="#7a4a8b" opacity="0.05"/>
  <!-- Bottom (negligible) -->
  <rect x="0" y="20" width="128" height="12" fill="#7a4a8b" opacity="0.01"/>
</svg>
