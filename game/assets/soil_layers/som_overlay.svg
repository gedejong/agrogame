<svg xmlns="http://www.w3.org/2000/svg" width="128" height="32" viewBox="0 0 128 32">
  <!-- Soil organic matter: dark specks concentrated near surface, fading with depth -->
  <!-- Dense surface zone (top 10px) -->
  <g fill="#3a2510" opacity="0.5">
    <ellipse cx="6" cy="3" rx="2" ry="0.8" transform="rotate(-10 6 3)"/>
    <ellipse cx="18" cy="5" rx="1.8" ry="0.7" transform="rotate(15 18 5)"/>
    <ellipse cx="30" cy="2" rx="2.2" ry="0.8" transform="rotate(-20 30 2)"/>
    <ellipse cx="42" cy="6" rx="1.5" ry="0.6" transform="rotate(10 42 6)"/>
    <ellipse cx="54" cy="3" rx="2" ry="0.8" transform="rotate(-15 54 3)"/>
    <ellipse cx="66" cy="5" rx="1.8" ry="0.7" transform="rotate(25 66 5)"/>
    <ellipse cx="78" cy="2" rx="2.2" ry="0.8" transform="rotate(-10 78 2)"/>
    <ellipse cx="90" cy="6" rx="1.5" ry="0.6" transform="rotate(20 90 6)"/>
    <ellipse cx="102" cy="4" rx="2" ry="0.8" transform="rotate(-25 102 4)"/>
    <ellipse cx="114" cy="3" rx="1.8" ry="0.7" transform="rotate(15 114 3)"/>
    <ellipse cx="126" cy="5" rx="1.5" ry="0.6" transform="rotate(-10 126 5)"/>
  </g>
  <!-- Medium zone (10-20px, fewer, smaller) -->
  <g fill="#3a2510" opacity="0.3">
    <ellipse cx="12" cy="14" rx="1.2" ry="0.5" transform="rotate(10 12 14)"/>
    <ellipse cx="36" cy="12" rx="1.4" ry="0.6" transform="rotate(-15 36 12)"/>
    <ellipse cx="58" cy="16" rx="1" ry="0.5" transform="rotate(20 58 16)"/>
    <ellipse cx="82" cy="13" rx="1.3" ry="0.6" transform="rotate(-10 82 13)"/>
    <ellipse cx="108" cy="15" rx="1.1" ry="0.5" transform="rotate(15 108 15)"/>
  </g>
  <!-- Deep zone (20-32px, very sparse) -->
  <g fill="#3a2510" opacity="0.15">
    <ellipse cx="24" cy="24" rx="0.8" ry="0.4" transform="rotate(-10 24 24)"/>
    <ellipse cx="72" cy="26" rx="0.9" ry="0.4" transform="rotate(15 72 26)"/>
    <ellipse cx="104" cy="22" rx="0.7" ry="0.3" transform="rotate(-20 104 22)"/>
  </g>
</svg>
