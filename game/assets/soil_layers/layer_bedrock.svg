<svg xmlns="http://www.w3.org/2000/svg" width="128" height="32" viewBox="0 0 128 32">
  <!-- Bedrock: solid grey rock with fracture lines -->
  <rect width="128" height="32" fill="#7a7a72"/>
  <!-- Major fracture lines -->
  <g stroke="#6a6a62" stroke-width="0.8" fill="none" opacity="0.6">
    <path d="M0,12 L15,10 L28,14 L40,11 L55,13 L68,10 L82,14 L95,11 L110,13 L128,12"/>
    <path d="M0,24 L12,22 L25,25 L38,23 L52,26 L65,22 L80,25 L92,23 L108,26 L120,23 L128,24"/>
  </g>
  <!-- Minor fracture lines -->
  <g stroke="#6a6a62" stroke-width="0.4" fill="none" opacity="0.4">
    <line x1="20" y1="8" x2="24" y2="16"/><line x1="50" y1="6" x2="48" y2="14"/>
    <line x1="75" y1="10" x2="78" y2="20"/><line x1="105" y1="8" x2="102" y2="18"/>
    <line x1="35" y1="18" x2="38" y2="28"/><line x1="85" y1="16" x2="82" y2="26"/>
    <line x1="115" y1="14" x2="118" y2="24"/>
  </g>
  <!-- Lighter rock patches -->
  <g fill="#8a8a82" opacity="0.25">
    <rect x="10" y="2" width="18" height="8" rx="2"/>
    <rect x="45" y="16" width="15" height="10" rx="2"/>
    <rect x="90" y="4" width="20" height="7" rx="2"/>
  </g>
</svg>
