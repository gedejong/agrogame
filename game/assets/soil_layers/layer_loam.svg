  <g fill="#7b5f37" opacity="0.45">
    <circle cx="5" cy="5" r="0.7"/><circle cx="15" cy="8" r="0.8"/><circle cx="25" cy="4" r="0.7"/>
    <circle cx="35" cy="7" r="0.8"/><circle cx="45" cy="5" r="0.7"/><circle cx="55" cy="9" r="0.8"/>
    <circle cx="65" cy="4" r="0.7"/><circle cx="75" cy="7" r="0.8"/><circle cx="85" cy="5" r="0.7"/>
    <circle cx="95" cy="8" r="0.8"/><circle cx="105" cy="4" r="0.7"/><circle cx="115" cy="7" r="0.8"/>
    <circle cx="125" cy="5" r="0.7"/>
    <circle cx="8" cy="16" r="0.7"/><circle cx="20" cy="18" r="0.8"/><circle cx="32" cy="15" r="0.7"/>
    <circle cx="44" cy="17" r="0.8"/><circle cx="58" cy="16" r="0.7"/><circle cx="70" cy="18" r="0.8"/>
    <circle cx="82" cy="15" r="0.7"/><circle cx="96" cy="17" r="0.8"/><circle cx="108" cy="16" r="0.7"/>
    <circle cx="120" cy="18" r="0.8"/>
    <circle cx="10" cy="26" r="0.7"/><circle cx="22" cy="28" r="0.8"/><circle cx="38" cy="25" r="0.7"/>
    <circle cx="50" cy="27" r="0.8"/><circle cx="64" cy="26" r="0.7"/><circle cx="76" cy="29" r="0.8"/>
    <circle cx="90" cy="25" r="0.7"/><circle cx="102" cy="28" r="0.8"/><circle cx="116" cy="26" r="0.7"/>
  </g>
  <!-- Dark organic specks -->
  <g fill="#5c4a30" opacity="0.5">
    <ellipse cx="12" cy="6" rx="1.5" ry="0.6" transform="rotate(-15 12 6)"/>
    <ellipse cx="38" cy="12" rx="1.2" ry="0.5" transform="rotate(20 38 12)"/>
    <ellipse cx="62" cy="8" rx="1.4" ry="0.6" transform="rotate(-10 62 8)"/>
