<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32">
  <!-- Rough/weedy: mixed weeds, stones, untended -->
  <polygon points="32,0 64,16 32,32 0,16" fill="#8a9060" stroke="#7a8050" stroke-width="1"/>
  <clipPath id="tile">
    <polygon points="32,0 64,16 32,32 0,16"/>
  </clipPath>
  <g clip-path="url(#tile)" transform="matrix(1,0.5,-1,0.5,32,0)">
    <!-- Weed tufts (irregular green patches) -->
    <g fill="#7a8850" opacity="0.5">
      <ellipse cx="6" cy="8" rx="2" ry="1.2" transform="rotate(-15 6 8)"/>
      <ellipse cx="20" cy="6" rx="1.8" ry="1" transform="rotate(20 20 6)"/>
      <ellipse cx="12" cy="20" rx="2.2" ry="1.3" transform="rotate(-10 12 20)"/>
      <ellipse cx="26" cy="24" rx="1.8" ry="1" transform="rotate(15 26 24)"/>
    </g>
    <!-- Stones (grey-brown) -->
    <g fill="#7a7060" opacity="0.5">
      <ellipse cx="14" cy="12" rx="1.5" ry="1" transform="rotate(25 14 12)"/>
      <ellipse cx="24" cy="16" rx="1.2" ry="0.8" transform="rotate(-10 24 16)"/>
      <ellipse cx="8" cy="26" rx="1.4" ry="0.9" transform="rotate(15 8 26)"/>
    </g>
    <!-- Bare dirt patches -->
    <g fill="#9a8a68" opacity="0.3">
      <ellipse cx="18" cy="14" rx="3" ry="2"/>
      <ellipse cx="6" cy="16" rx="2" ry="1.5"/>
      <ellipse cx="24" cy="28" rx="2.5" ry="1.5"/>
    </g>
    <!-- Tiny weed stems -->
    <g stroke="#7a8850" stroke-width="0.4" stroke-linecap="round" opacity="0.4">
      <line x1="10" y1="10" x2="11" y2="8"/><line x1="22" y1="20" x2="23" y2="18"/>
      <line x1="16" y1="26" x2="17" y2="24"/>
    </g>
  </g>
</svg>
