<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32">
  <!-- Bare dirt: rough, uneven, small stones -->
  <polygon points="32,0 64,16 32,32 0,16" fill="#a89070" stroke="#988060" stroke-width="1"/>
  <clipPath id="tile">
    <polygon points="32,0 64,16 32,32 0,16"/>
  </clipPath>
  <g clip-path="url(#tile)" transform="matrix(1,0.5,-1,0.5,32,0)">
    <!-- Rough texture (uneven surface) -->
    <g fill="#988060" opacity="0.45">
      <circle cx="6" cy="5" r="0.9"/><circle cx="14" cy="8" r="1"/><circle cx="22" cy="4" r="0.8"/>
      <circle cx="28" cy="10" r="0.9"/><circle cx="8" cy="14" r="1"/><circle cx="18" cy="16" r="0.8"/>
      <circle cx="26" cy="18" r="0.9"/><circle cx="4" cy="22" r="1"/><circle cx="12" cy="24" r="0.8"/>
      <circle cx="20" cy="20" r="0.9"/><circle cx="28" cy="26" r="1"/><circle cx="16" cy="28" r="0.8"/>
    </g>
    <!-- Small stones -->
    <g fill="#8a7a62" opacity="0.5">
      <ellipse cx="10" cy="10" rx="1.5" ry="1" transform="rotate(20 10 10)"/>
      <ellipse cx="24" cy="14" rx="1.2" ry="0.8" transform="rotate(-15 24 14)"/>
      <ellipse cx="6" cy="26" rx="1.3" ry="0.9" transform="rotate(10 6 26)"/>
      <ellipse cx="20" cy="24" rx="1.4" ry="1" transform="rotate(-25 20 24)"/>
    </g>
    <!-- Light patches -->
    <g fill="#b8a080" opacity="0.25">
      <ellipse cx="16" cy="12" rx="2.5" ry="1.5"/>
      <ellipse cx="8" cy="20" rx="2" ry="1.2"/>
    </g>
  </g>
</svg>
