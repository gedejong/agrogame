<svg xmlns="http://www.w3.org/2000/svg" width="64" height="38" viewBox="0 0 64 38">
  <!-- Vertical fence: wooden posts along top-left iso edge -->
  <!-- Offset 6px down to avoid clipping at top -->
  <!-- Fence posts (along the top-left edge: from top vertex to left vertex) -->
  <line x1="24" y1="10" x2="24" y2="4" stroke="#6b5040" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="16" x2="12" y2="10" stroke="#6b5040" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="21" x2="2" y2="15" stroke="#6b5040" stroke-width="2" stroke-linecap="round"/>
  <!-- Rails connecting posts -->
  <line x1="24" y1="6" x2="2" y2="17" stroke="#7a6050" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="4" x2="2" y2="15" stroke="#7a6050" stroke-width="1" stroke-linecap="round"/>
  <!-- Post highlights (top-left lit) -->
  <g stroke="#8a7060" stroke-width="0.4" stroke-linecap="round" opacity="0.5">
    <line x1="23.5" y1="10" x2="23.5" y2="4"/>
    <line x1="11.5" y1="16" x2="11.5" y2="10"/>
  </g>
</svg>
