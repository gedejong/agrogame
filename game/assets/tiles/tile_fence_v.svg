<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32">
  <!-- Fence along top-left iso edge: (32,0) → (0,16) -->
  <!-- Posts at exactly 1/4, 1/2, 3/4 along edge -->
  <!-- 1/4: (24,4)  1/2: (16,8)  3/4: (8,12) — post height 6px -->
  <line x1="24" y1="10" x2="24" y2="4" stroke="#6b5040" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="14" x2="16" y2="8" stroke="#6b5040" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="18" x2="8" y2="12" stroke="#6b5040" stroke-width="2" stroke-linecap="round"/>
  <!-- Rails: full edge (31,1) → (1,16) -->
  <line x1="31" y1="1" x2="1" y2="16" stroke="#7a6050" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="31" y1="3" x2="1" y2="18" stroke="#7a6050" stroke-width="1" stroke-linecap="round"/>
  <!-- Post highlights -->
  <g stroke="#8a7060" stroke-width="0.4" stroke-linecap="round" opacity="0.5">
    <line x1="23" y1="10" x2="23" y2="4"/>
    <line x1="15" y1="14" x2="15" y2="8"/>
    <line x1="7" y1="18" x2="7" y2="12"/>
  </g>
</svg>
