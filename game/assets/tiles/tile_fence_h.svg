<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32">
  <!-- Fence along top-right iso edge: (32,0) → (64,16) -->
  <!-- Posts at exactly 1/4, 1/2, 3/4 along edge -->
  <!-- 1/4: (40,4)  1/2: (48,8)  3/4: (56,12) — post height 6px -->
  <line x1="40" y1="10" x2="40" y2="4" stroke="#6b5040" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="14" x2="48" y2="8" stroke="#6b5040" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="18" x2="56" y2="12" stroke="#6b5040" stroke-width="2" stroke-linecap="round"/>
  <!-- Rails: full edge (33,1) → (63,16) -->
  <line x1="33" y1="1" x2="63" y2="16" stroke="#7a6050" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="33" y1="3" x2="63" y2="18" stroke="#7a6050" stroke-width="1" stroke-linecap="round"/>
  <!-- Post highlights -->
  <g stroke="#8a7060" stroke-width="0.4" stroke-linecap="round" opacity="0.5">
    <line x1="39" y1="10" x2="39" y2="4"/>
    <line x1="47" y1="14" x2="47" y2="8"/>
    <line x1="55" y1="18" x2="55" y2="12"/>
  </g>
</svg>
