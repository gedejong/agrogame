<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Dark backing circle, no ring -->
  <circle cx="8" cy="8" r="7.5" fill="#1E2532" opacity="0.80"/>
  <circle cx="8" cy="8" r="7.2" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.12"/>
  <!-- Snowflake: 6 main arms (filled rects) -->
  <rect x="7.2" y="1.8" width="1.6" height="12.4" rx="0.8" fill="#88CCFF"/>
  <rect x="7.2" y="1.8" width="1.6" height="12.4" rx="0.8" fill="#88CCFF" transform="rotate(60 8 8)"/>
  <rect x="7.2" y="1.8" width="1.6" height="12.4" rx="0.8" fill="#88CCFF" transform="rotate(-60 8 8)"/>
  <!-- Center -->
  <circle cx="8" cy="8" r="1.8" fill="#BBDDFF"/>
  <!-- Branch forks as small filled triangles (not strokes) -->
  <!-- Top arm branches -->
  <polygon points="8,3.5 6,5 7.2,4.5" fill="#88CCFF"/>
  <polygon points="8,3.5 10,5 8.8,4.5" fill="#88CCFF"/>
  <!-- Bottom arm branches -->
  <polygon points="8,12.5 6,11 7.2,11.5" fill="#88CCFF"/>
  <polygon points="8,12.5 10,11 8.8,11.5" fill="#88CCFF"/>
  <!-- Upper-right branches -->
  <polygon points="11.2,6 12.8,4.8 12,5.8" fill="#88CCFF"/>
  <polygon points="11.2,6 13.2,6.8 12.2,6.8" fill="#88CCFF"/>
  <!-- Lower-left branches -->
  <polygon points="4.8,10 3.2,11.2 4,10.2" fill="#88CCFF"/>
  <polygon points="4.8,10 2.8,9.2 3.8,9.2" fill="#88CCFF"/>
  <!-- Upper-left branches -->
  <polygon points="4.8,6 2.8,6.8 3.8,6.8" fill="#88CCFF"/>
  <polygon points="4.8,6 3.2,4.8 4,5.8" fill="#88CCFF"/>
  <!-- Lower-right branches -->
  <polygon points="11.2,10 13.2,9.2 12.2,9.2" fill="#88CCFF"/>
  <polygon points="11.2,10 12.8,11.2 12,10.2" fill="#88CCFF"/>
</svg>
