<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- P deficiency: centered PO₄³⁻ molecule (from icon_p.svg) + red minus badge -->
  <!-- Glassmorphism backing -->
  <circle cx="8" cy="8" r="7.5" fill="#1E2532" opacity="0.80"/>
  <circle cx="8" cy="8" r="7.2" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.12"/>
  <!--
    PO₄³⁻ tetrahedral geometry, centered at (8, 8):
    4 outer atoms at 90° intervals, radius 4.0 from center
    Atom 1: 0°   (right)  = (12, 8)
    Atom 2: 90°  (top)    = (8, 4)
    Atom 3: 180° (left)   = (4, 8)
    Atom 4: 270° (bottom) = (8, 12)
  -->
  <!-- Bonds -->
  <line x1="8" y1="8" x2="8" y2="4" fill="none" stroke="#9959C7" stroke-width="1"/>
  <line x1="8" y1="8" x2="12" y2="8" fill="none" stroke="#9959C7" stroke-width="1"/>
  <line x1="8" y1="8" x2="4" y2="8" fill="none" stroke="#9959C7" stroke-width="1"/>
  <line x1="8" y1="8" x2="8" y2="12" fill="none" stroke="#9959C7" stroke-width="1"/>
  <!-- Center atom (P) -->
  <circle cx="8" cy="8" r="2" fill="#9959C7"/>
  <!-- Outer atoms (O) -->
  <circle cx="8" cy="4" r="1.5" fill="#9959C7"/>
  <circle cx="12" cy="8" r="1.5" fill="#9959C7"/>
  <circle cx="4" cy="8" r="1.5" fill="#9959C7"/>
  <circle cx="8" cy="12" r="1.5" fill="#9959C7"/>
  <!-- Red minus badge (top-right corner) -->
  <circle cx="13" cy="3" r="2.5" fill="#DD3333"/>
  <rect x="11.2" y="2.5" width="3.6" height="1.2" rx="0.4" fill="#FFFFFF"/>
</svg>
