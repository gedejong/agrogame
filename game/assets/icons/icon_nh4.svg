<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Ammonium NH₄⁺: tetrahedral — 1 center N + 4 outer H -->
  <!-- Bonds -->
  <line x1="8" y1="8" x2="8" y2="2.5" stroke="#73C759" stroke-width="1"/>
  <line x1="8" y1="8" x2="2.5" y2="10" stroke="#73C759" stroke-width="1"/>
  <line x1="8" y1="8" x2="13.5" y2="10" stroke="#73C759" stroke-width="1"/>
  <line x1="8" y1="8" x2="8" y2="14" stroke="#73C759" stroke-width="1"/>
  <!-- Center atom (N, larger) -->
  <circle cx="8" cy="8" r="2.5" fill="#73C759"/>
  <!-- Outer atoms (H, smaller) -->
  <circle cx="8" cy="2" r="1.5" fill="#73C759"/>
  <circle cx="2.2" cy="10.5" r="1.5" fill="#73C759"/>
  <circle cx="13.8" cy="10.5" r="1.5" fill="#73C759"/>
  <circle cx="8" cy="14.2" r="1.5" fill="#73C759"/>
</svg>
