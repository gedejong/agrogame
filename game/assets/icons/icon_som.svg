<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Organic matter: carbon zigzag chain (skeletal formula) -->
  <!-- C-C bonds in zigzag -->
  <polyline points="1,10 4,5 7,10 10,5 13,10" fill="none" stroke="#996B40" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Carbon atom dots at vertices -->
  <circle cx="1" cy="10" r="1.2" fill="#996B40"/>
  <circle cx="4" cy="5" r="1.2" fill="#996B40"/>
  <circle cx="7" cy="10" r="1.2" fill="#996B40"/>
  <circle cx="10" cy="5" r="1.2" fill="#996B40"/>
  <circle cx="13" cy="10" r="1.2" fill="#996B40"/>
</svg>
