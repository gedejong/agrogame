  <path d="M13,8 Q16,7 15,5" fill="none" stroke="#E68C1A" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M13,9 Q15,11 14,13" fill="none" stroke="#E68C1A" stroke-width="0.8" stroke-linecap="round"/>
</svg>
