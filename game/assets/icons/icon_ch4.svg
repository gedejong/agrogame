<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- CH₄ (methane): tetrahedral C + 4H + upward arrow (emission) -->
  <!-- Glassmorphism backing -->
  <circle cx="8" cy="8" r="7.5" fill="#1E2532" opacity="0.80"/>
  <circle cx="8" cy="8" r="7.2" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.12"/>
  <!--
    CH₄ tetrahedral, centered at (8, 9):
    C at center (8, 9)
    4 H at corners: top (8,6), left (5,10.5), right (11,10.5), back (8,12)
  -->
  <!-- Bonds -->
  <line x1="8" y1="9" x2="8" y2="6" fill="none" stroke="#FBBF24" stroke-width="0.8"/>
  <line x1="8" y1="9" x2="5" y2="10.5" fill="none" stroke="#FBBF24" stroke-width="0.8"/>
  <line x1="8" y1="9" x2="11" y2="10.5" fill="none" stroke="#FBBF24" stroke-width="0.8"/>
  <line x1="8" y1="9" x2="8" y2="12" fill="none" stroke="#FBBF24" stroke-width="0.8"/>
  <!-- Center atom (C) -->
  <circle cx="8" cy="9" r="1.8" fill="#FBBF24"/>
  <!-- Outer atoms (H) -->
  <circle cx="8" cy="6" r="1.2" fill="#FFD966"/>
  <circle cx="5" cy="10.5" r="1.2" fill="#FFD966"/>
  <circle cx="11" cy="10.5" r="1.2" fill="#FFD966"/>
  <circle cx="8" cy="12" r="1.2" fill="#FFD966"/>
  <!-- Upward emission arrow (subtle) -->
  <polygon points="8,1.5 6,4 7.2,4 7.2,5.5 8.8,5.5 8.8,4 10,4" fill="#FFE088" opacity="0.6"/>
</svg>
