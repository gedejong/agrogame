<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Wheat mature: ~22px tall, golden, heavy drooping seed heads -->
  <!-- Cast shadow -->
  <ellipse cx="19" cy="29" rx="6" ry="2.2" fill="#000000" opacity="0.14" transform="skewX(-15)"/>
  <!-- Tillers (golden stalks, slightly bowed under weight) -->
  <path d="M12,28 Q11,18 10.5,9" fill="none" stroke="#8b7345" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M14,28 Q13.5,18 13,8" fill="none" stroke="#8b7345" stroke-width="1" stroke-linecap="round"/>
  <path d="M16,28 Q16,18 16,7" fill="none" stroke="#8b7345" stroke-width="1" stroke-linecap="round"/>
  <path d="M18,28 Q18.5,18 19,8" fill="none" stroke="#8b7345" stroke-width="1" stroke-linecap="round"/>
  <path d="M20,28 Q21,18 21.5,9" fill="none" stroke="#8b7345" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Heavy seed heads (drooping slightly, golden) -->
  <ellipse cx="10" cy="8" rx="1.2" ry="3" fill="#c8a832" transform="rotate(-8 10 8)"/>
  <ellipse cx="13" cy="7" rx="1.2" ry="3" fill="#c8a832" transform="rotate(-4 13 7)"/>
  <ellipse cx="16" cy="6" rx="1.2" ry="3" fill="#c8a832"/>
  <ellipse cx="19" cy="7" rx="1.2" ry="3" fill="#c8a832" transform="rotate(4 19 7)"/>
  <ellipse cx="22" cy="8" rx="1.2" ry="3" fill="#c8a832" transform="rotate(8 22 8)"/>
  <!-- Awns (golden whiskers) -->
  <g stroke="#b8a040" stroke-width="0.4" stroke-linecap="round">
    <line x1="10" y1="5" x2="9" y2="3.5"/>
    <line x1="13" y1="4" x2="12" y2="2.5"/>
    <line x1="16" y1="3" x2="16" y2="1.5"/>
    <line x1="19" y1="4" x2="20" y2="2.5"/>
    <line x1="22" y1="5" x2="23" y2="3.5"/>
  </g>
  <!-- Dried narrow leaves -->
  <path d="M13,20 Q9,19 8,20.5" fill="none" stroke="#b8a040" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M19,19 Q23,18 24,19.5" fill="none" stroke="#b8a040" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Highlight on left seed heads -->
  <ellipse cx="9.5" cy="7.5" rx="0.4" ry="1.8" fill="#d8c050" opacity="0.45" transform="rotate(-8 9.5 7.5)"/>
  <ellipse cx="12.5" cy="6.5" rx="0.4" ry="1.8" fill="#d8c050" opacity="0.45"/>
</svg>
