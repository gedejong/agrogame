<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Rice N-deficient: ~14px tall, very pale green, sparse, stunted -->
  <!-- Cast shadow -->
  <ellipse cx="17" cy="29" rx="3" ry="1" fill="#000000" opacity="0.08" transform="skewX(-15)"/>
  <!-- Sparse thin stems (only 3-4, stunted) -->
  <line x1="14" y1="28" x2="13" y2="15" stroke="#8a9a4a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="16" y2="14" stroke="#8a9a4a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="18" y1="28" x2="19" y2="15" stroke="#8a9a4a" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Pale narrow leaves -->
  <path d="M14.5,22 Q12,21 11,22" fill="none" stroke="#c8d86a" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M17.5,21 Q20,20 21,21" fill="none" stroke="#c8d86a" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M15,18 Q13,17 12,17.5" fill="none" stroke="#d0dc78" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M17,17.5 Q19,16.5 20,17" fill="none" stroke="#d0dc78" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Yellowing lower leaf tips -->
  <path d="M11,22 Q10,22.5 9.5,23.5" fill="none" stroke="#d0dc78" stroke-width="0.4" stroke-linecap="round"/>
  <path d="M21,21 Q22,21.5 22.5,22.5" fill="none" stroke="#d0dc78" stroke-width="0.4" stroke-linecap="round"/>
</svg>
