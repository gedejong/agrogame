<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Maize ear: narrow rectangular cob with husk and silk -->
  <!-- Cob body — narrow rectangle with rounded ends -->
  <rect x="18" y="10" width="3" height="8" rx="1.2" fill="#d4a030"/>
  <rect x="18.5" y="10.5" width="2" height="7" rx="0.8" fill="#c49a28"/>
  <!-- Kernel rows (subtle lines) -->
  <line x1="19" y1="11" x2="19" y2="17" stroke="#b88a20" stroke-width="0.3"/>
  <line x1="20" y1="11" x2="20" y2="17" stroke="#b88a20" stroke-width="0.3"/>
  <!-- Husk leaves wrapping base -->
  <path d="M18,17 Q16,15 17,12" fill="none" stroke="#7a8a4a" stroke-width="0.7"/>
  <path d="M21,17 Q22,15 21.5,13" fill="none" stroke="#7a8a4a" stroke-width="0.5"/>
  <!-- Silk at top -->
  <line x1="19" y1="10" x2="17" y2="8" stroke="#c8a870" stroke-width="0.4"/>
  <line x1="19.5" y1="10" x2="19.5" y2="7.5" stroke="#c8a870" stroke-width="0.4"/>
  <line x1="20" y1="10" x2="21.5" y2="8" stroke="#c8a870" stroke-width="0.4"/>
</svg>
