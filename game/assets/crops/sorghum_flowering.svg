<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Sorghum flowering: ~22px tall, dense seed head forming, green-brown -->
  <!-- Cast shadow -->
  <ellipse cx="20" cy="29" rx="6.5" ry="2.3" fill="#000000" opacity="0.14" transform="skewX(-15)"/>
  <!-- Thick stalk -->
  <line x1="16" y1="28" x2="16" y2="8" stroke="#3d6b22" stroke-width="3" stroke-linecap="round"/>
  <!-- Dense seed head (conical/oval, green-brown) -->
  <ellipse cx="16" cy="6" rx="3" ry="4" fill="#6b7a3a"/>
  <!-- Seed head texture dots (reuse stalk color) -->
  <g fill="#3d6b22" opacity="0.5">
    <circle cx="14.5" cy="5" r="0.6"/>
    <circle cx="16" cy="4" r="0.6"/>
    <circle cx="17.5" cy="5" r="0.6"/>
    <circle cx="15" cy="7" r="0.6"/>
    <circle cx="17" cy="7" r="0.6"/>
    <circle cx="16" cy="8.5" r="0.5"/>
  </g>
  <!-- Seed head highlight (top-left, reuse leaf highlight color) -->
  <ellipse cx="14.5" cy="5" rx="1.2" ry="2" fill="#7abb4a" opacity="0.35"/>
  <!-- Leaf pair 1 (lower, broad) -->
  <path d="M16,25 Q9,22 6,24.5" fill="#5b9e2a" stroke="none"/>
  <path d="M16,24 Q23,21 26,23.5" fill="#5b9e2a" stroke="none"/>
  <!-- Leaf pair 2 -->
  <path d="M16,21 Q10,17 6,20" fill="#3d6b22" stroke="none"/>
  <path d="M16,20 Q22,16 26,19" fill="#3d6b22" stroke="none"/>
  <!-- Leaf pair 3 -->
  <path d="M16,17 Q12,14 9,16" fill="#5b9e2a" stroke="none"/>
  <path d="M16,16 Q20,13 23,15" fill="#5b9e2a" stroke="none"/>
  <!-- Highlights on left leaves -->
  <path d="M15.5,24.5 Q9.5,22 6.5,24" fill="none" stroke="#7abb4a" stroke-width="0.6" opacity="0.45"/>
  <path d="M15.5,20.5 Q10.5,17 6.5,19.5" fill="none" stroke="#7abb4a" stroke-width="0.5" opacity="0.45"/>
</svg>
