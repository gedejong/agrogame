<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Wheat N-deficient: ~16px tall, pale, stunted, sparse tillers -->
  <!-- Cast shadow -->
  <ellipse cx="17.5" cy="29" rx="3.5" ry="1.2" fill="#000000" opacity="0.09" transform="skewX(-15)"/>
  <!-- Tillers (sparse — only 3-4, pale, thin, stunted) -->
  <line x1="13.5" y1="28" x2="12" y2="14" stroke="#8a9a4a" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="15.5" y1="28" x2="15" y2="13" stroke="#8a9a4a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="17" y1="28" x2="17.5" y2="13" stroke="#8a9a4a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="19" y1="28" x2="20" y2="14" stroke="#8a9a4a" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Pale narrow leaves -->
  <path d="M14,22 Q11,21 10,22" fill="none" stroke="#c8d86a" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M18,21 Q21,20 22,21" fill="none" stroke="#c8d86a" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M15,17 Q12,16 11,17" fill="none" stroke="#d0dc78" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M17,16 Q20,15 21,16" fill="none" stroke="#d0dc78" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Yellowing lower leaf tips -->
  <path d="M10,22 Q9,22.5 8.5,23.5" fill="none" stroke="#d8d070" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M22,21 Q23,21.5 23.5,22.5" fill="none" stroke="#d8d070" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Subtle highlight on left -->
  <line x1="14.8" y1="27.5" x2="14.5" y2="13.5" stroke="#d8e880" stroke-width="0.25" opacity="0.4"/>
</svg>
