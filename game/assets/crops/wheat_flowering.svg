<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Wheat flowering: ~20px tall, tillers with forming green seed heads -->
  <!-- Cast shadow -->
  <ellipse cx="19" cy="29" rx="5" ry="2" fill="#000000" opacity="0.13" transform="skewX(-15)"/>
  <!-- Tillers -->
  <line x1="12" y1="28" x2="10" y2="10" stroke="#3d6b22" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="14" y1="28" x2="13" y2="9" stroke="#3d6b22" stroke-width="1" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="16" y2="8" stroke="#3d6b22" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="28" x2="19" y2="9" stroke="#3d6b22" stroke-width="1" stroke-linecap="round"/>
  <line x1="20" y1="28" x2="22" y2="10" stroke="#3d6b22" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Seed heads (small elongated ovals at top of each tiller) -->
  <ellipse cx="10" cy="9" rx="1" ry="2.5" fill="#5b9e2a" transform="rotate(-5 10 9)"/>
  <ellipse cx="13" cy="8" rx="1" ry="2.5" fill="#5b9e2a" transform="rotate(-2 13 8)"/>
  <ellipse cx="16" cy="7" rx="1" ry="2.5" fill="#5b9e2a"/>
  <ellipse cx="19" cy="8" rx="1" ry="2.5" fill="#5b9e2a" transform="rotate(2 19 8)"/>
  <ellipse cx="22" cy="9" rx="1" ry="2.5" fill="#5b9e2a" transform="rotate(5 22 9)"/>
  <!-- Awns (short whiskers on seed heads) -->
  <g stroke="#4d8e22" stroke-width="0.4" stroke-linecap="round">
    <line x1="10" y1="6.5" x2="9.5" y2="5"/>
    <line x1="13" y1="5.5" x2="12.5" y2="4"/>
    <line x1="16" y1="4.5" x2="16" y2="3"/>
    <line x1="19" y1="5.5" x2="19.5" y2="4"/>
    <line x1="22" y1="6.5" x2="22.5" y2="5"/>
  </g>
  <!-- Narrow leaves -->
  <path d="M13,20 Q9,18 8,19.5" fill="none" stroke="#4d8e22" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M19,19 Q23,17 24,18.5" fill="none" stroke="#4d8e22" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M14,15 Q10,13.5 9,14.5" fill="none" stroke="#3d7a1a" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M18,14 Q22,12.5 23,13.5" fill="none" stroke="#3d7a1a" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Highlight on left seed heads -->
  <ellipse cx="9.5" cy="8.5" rx="0.4" ry="1.5" fill="#7abb4a" opacity="0.4" transform="rotate(-5 9.5 8.5)"/>
  <ellipse cx="12.5" cy="7.5" rx="0.4" ry="1.5" fill="#7abb4a" opacity="0.4"/>
</svg>
