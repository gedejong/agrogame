<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Grape flowering: ~14px tall, small green flower clusters among leaves -->
  <!-- Cast shadow -->
  <ellipse cx="18.5" cy="29" rx="5.5" ry="2" fill="#000000" opacity="0.13" transform="skewX(-15)"/>
  <!-- Woody main stem -->
  <path d="M16,28 Q15.5,23 16,18" fill="none" stroke="#6b5040" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Woody branches -->
  <path d="M16,21 Q11,19 8,20" fill="none" stroke="#6b5040" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M16,20 Q21,18 24,19" fill="none" stroke="#6b5040" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M16,18 Q13,16 10,17" fill="none" stroke="#6b5040" stroke-width="1" stroke-linecap="round"/>
  <path d="M16,17 Q19,15 22,16" fill="none" stroke="#6b5040" stroke-width="1" stroke-linecap="round"/>
  <!-- Broad leaves -->
  <path d="M9,19 Q7,17 6,18 Q7,20 9,21 Z" fill="#4d8e22"/>
  <path d="M23,18 Q25,16 26,17 Q25,19 23,20 Z" fill="#4d8e22"/>
  <path d="M11,16 Q9,14.5 8,15.5 Q9,17 11,17.5 Z" fill="#5b9e2a"/>
  <path d="M21,15 Q23,13.5 24,14.5 Q23,16 21,16.5 Z" fill="#5b9e2a"/>
  <!-- Top leaf cluster -->
  <path d="M15,17 Q14,15.5 13,16.5 Q14,18 16,18 Q17,16 16.5,15 Z" fill="#4d8e22"/>
  <!-- Small green flower clusters (tiny dots hanging under leaves) -->
  <g fill="#8fb83a" opacity="0.8">
    <circle cx="9" cy="21.5" r="0.8"/>
    <circle cx="10" cy="22" r="0.6"/>
    <circle cx="23" cy="20.5" r="0.8"/>
    <circle cx="22" cy="21" r="0.6"/>
    <circle cx="15" cy="22" r="0.7"/>
    <circle cx="17" cy="22" r="0.7"/>
  </g>
  <!-- Highlight -->
  <path d="M8.5,18.5 Q7.5,17.5 6.5,18" fill="none" stroke="#5b9e2a" stroke-width="0.4" opacity="0.5"/>
</svg>
