<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Sorghum mature: ~24px tall, heavy brown/red seed head, drying leaves -->
  <!-- Cast shadow -->
  <ellipse cx="20" cy="29" rx="7" ry="2.5" fill="#000000" opacity="0.15" transform="skewX(-15)"/>
  <!-- Thick stalk (drying) -->
  <line x1="16" y1="28" x2="16" y2="6" stroke="#7a6a3a" stroke-width="3" stroke-linecap="round"/>
  <!-- Dense seed head (heavy, brown/red) -->
  <ellipse cx="16" cy="4.5" rx="3.5" ry="4.5" fill="#8b4a2a"/>
  <!-- Seed head texture (reuse stalk color) -->
  <g fill="#7a6a3a" opacity="0.4">
    <circle cx="14.5" cy="3.5" r="0.7"/>
    <circle cx="16" cy="2.5" r="0.7"/>
    <circle cx="17.5" cy="3.5" r="0.7"/>
    <circle cx="14.5" cy="5.5" r="0.7"/>
    <circle cx="17.5" cy="5.5" r="0.7"/>
    <circle cx="16" cy="6.5" r="0.6"/>
  </g>
  <!-- Seed head highlight (top-left) -->
  <ellipse cx="14.5" cy="3.5" rx="1.3" ry="2.2" fill="#c8a832" opacity="0.35"/>
  <!-- Leaf pair 1 (lower, drying golden) -->
  <path d="M16,25 Q9,22 6,24.5" fill="#c8a832" stroke="none"/>
  <path d="M16,24 Q23,21 26,23.5" fill="#c8a832" stroke="none"/>
  <!-- Leaf pair 2 -->
  <path d="M16,21 Q10,17 6,20" fill="#c8a832" stroke="none"/>
  <path d="M16,20 Q22,16 26,19" fill="#c8a832" stroke="none"/>
  <!-- Leaf pair 3 -->
  <path d="M16,17 Q12,14 9,16" fill="#c8a832" stroke="none"/>
  <path d="M16,16 Q20,13 23,15" fill="#c8a832" stroke="none"/>
  <!-- Highlight on left leaves -->
  <path d="M15.5,24.5 Q9.5,22 6.5,24" fill="none" stroke="#c8a832" stroke-width="0.6" opacity="0.45"/>
</svg>
