<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Grape N-deficient: ~12px tall, pale leaves, sparse, no fruit -->
  <!-- Cast shadow -->
  <ellipse cx="17.5" cy="29" rx="4" ry="1.3" fill="#000000" opacity="0.09" transform="skewX(-15)"/>
  <!-- Woody main stem (thin) -->
  <path d="M16,28 Q15.5,24 16,20" fill="none" stroke="#6b5040" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Sparse branches -->
  <path d="M16,22 Q12,20.5 9,21.5" fill="none" stroke="#6b5040" stroke-width="1" stroke-linecap="round"/>
  <path d="M16,21 Q20,19.5 23,20.5" fill="none" stroke="#6b5040" stroke-width="1" stroke-linecap="round"/>
  <!-- Pale sparse leaves (fewer, smaller, yellow-green) -->
  <path d="M10,20.5 Q8.5,19 8,20 Q9,21.5 10,21.5 Z" fill="#c8d86a"/>
  <path d="M22,19.5 Q23.5,18 24,19 Q23,20.5 22,20.5 Z" fill="#c8d86a"/>
  <path d="M14,19.5 Q13,18.5 12.5,19 Q13,20 14,20 Z" fill="#d0dc78"/>
  <path d="M18,19 Q19,18 19.5,18.5 Q19,19.5 18,19.5 Z" fill="#d0dc78"/>
  <!-- Yellowing tips -->
  <path d="M8,20 Q7,19.5 6.5,20" fill="none" stroke="#d0dc78" stroke-width="0.4" stroke-linecap="round"/>
  <!-- Weak tendril -->
  <path d="M9,21.5 Q7.5,21.5 7,22.5" fill="none" stroke="#c8d86a" stroke-width="0.3" stroke-linecap="round"/>
</svg>
