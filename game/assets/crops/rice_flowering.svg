<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Rice flowering: ~18px tall, panicles extending, green-gold tint -->
  <!-- Cast shadow -->
  <ellipse cx="18" cy="29" rx="4.5" ry="1.5" fill="#000000" opacity="0.12" transform="skewX(-15)"/>
  <!-- Thin stems -->
  <line x1="12" y1="28" x2="10.5" y2="12" stroke="#3d6b22" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="14" y1="28" x2="13" y2="11" stroke="#3d6b22" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="16" y2="10" stroke="#3d6b22" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="18" y1="28" x2="19" y2="11" stroke="#3d6b22" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="20" y1="28" x2="21.5" y2="12" stroke="#3d6b22" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Panicles (beginning to droop, green-gold, branching from stem tops) -->
  <g stroke="#8fb83a" stroke-width="0.5" stroke-linecap="round" fill="none">
    <path d="M10.5,12 Q9,10 8,11"/>
    <path d="M10.5,12 Q10,10 9.5,9"/>
    <path d="M13,11 Q11.5,9 11,10"/>
    <path d="M13,11 Q12.5,8.5 12,8"/>
    <path d="M16,10 Q15,8 14,9"/>
    <path d="M16,10 Q16,7.5 16,7"/>
    <path d="M19,11 Q20,8.5 20,8"/>
    <path d="M19,11 Q20.5,9 21,10"/>
    <path d="M21.5,12 Q22,10 22.5,9"/>
    <path d="M21.5,12 Q23,10 23.5,11"/>
  </g>
  <!-- Narrow leaves -->
  <path d="M13.5,20 Q10,18.5 8.5,19.5" fill="none" stroke="#4d8e22" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M18.5,19 Q22,17.5 23.5,18.5" fill="none" stroke="#4d8e22" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M14,15.5 Q11.5,14.5 10.5,15" fill="none" stroke="#3d6b22" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M18,15 Q20.5,14 21.5,14.5" fill="none" stroke="#3d6b22" stroke-width="0.5" stroke-linecap="round"/>
</svg>
