<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Grape wilting: ~12px tall, leaves curling, browning edges -->
  <!-- Cast shadow -->
  <ellipse cx="18" cy="29" rx="4.5" ry="1.5" fill="#000000" opacity="0.11" transform="skewX(-15)"/>
  <!-- Woody main stem -->
  <path d="M16,28 Q15.5,24 16,20" fill="none" stroke="#5a4535" stroke-width="2" stroke-linecap="round"/>
  <!-- Woody branches (drooping slightly) -->
  <path d="M16,22 Q11,20.5 8,22" fill="none" stroke="#5a4535" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M16,21 Q21,19.5 24,21" fill="none" stroke="#5a4535" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Curling/browning leaves (smaller, stressed shapes) -->
  <path d="M9,21 Q7.5,19.5 7,20.5 Q8,22 9,22 Z" fill="#a88a35"/>
  <path d="M23,20 Q24.5,18.5 25,19.5 Q24,21 23,21 Z" fill="#a88a35"/>
  <path d="M13,19 Q12,18 11.5,18.5 Q12,20 13,20 Z" fill="#b8943a"/>
  <path d="M19,18.5 Q20,17.5 20.5,18 Q20,19.5 19,19.5 Z" fill="#b8943a"/>
  <!-- Brown curling edges on leaves -->
  <path d="M7,20.5 Q6,20 6.5,19.5" fill="none" stroke="#8b6b3a" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M25,19.5 Q26,19 25.5,18.5" fill="none" stroke="#8b6b3a" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Shriveled tendrils -->
  <path d="M8,22 Q6.5,22 6,23" fill="none" stroke="#7a6a3a" stroke-width="0.3" stroke-linecap="round"/>
</svg>
