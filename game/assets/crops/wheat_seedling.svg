<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Wheat seedling: ~6px tall, 2-3 thin grass-like shoots -->
  <!-- Cast shadow -->
  <ellipse cx="17" cy="29" rx="2.5" ry="1" fill="#000000" opacity="0.1" transform="skewX(-15)"/>
  <!-- Thin blades (tillers emerging) -->
  <line x1="15" y1="28" x2="14" y2="23" stroke="#a8d86a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="16" y2="22" stroke="#a8d86a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="17" y1="28" x2="18" y2="23" stroke="#a8d86a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Highlight on center blade -->
  <line x1="15.8" y1="27.5" x2="15.8" y2="22.5" stroke="#c0ea8a" stroke-width="0.3" opacity="0.5"/>
</svg>
