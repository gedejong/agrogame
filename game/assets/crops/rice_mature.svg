<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Rice mature: ~20px tall, heavy drooping golden panicles -->
  <!-- Cast shadow -->
  <ellipse cx="18.5" cy="29" rx="5.5" ry="2" fill="#000000" opacity="0.13" transform="skewX(-15)"/>
  <!-- Thin stems (bowing under weight of grain) -->
  <path d="M12,28 Q11,18 10,11" fill="none" stroke="#8b7345" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M14,28 Q13.5,18 13,10" fill="none" stroke="#8b7345" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M16,28 Q16,18 16,9" fill="none" stroke="#8b7345" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M18,28 Q18.5,18 19,10" fill="none" stroke="#8b7345" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M20,28 Q21,18 22,11" fill="none" stroke="#8b7345" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Heavy DROOPING panicles (golden, curving down — the key rice identifier) -->
  <g stroke="#c8a832" stroke-width="0.6" stroke-linecap="round" fill="none">
    <path d="M10,11 Q8,10 7,12"/>
    <path d="M10,11 Q9,9 8,10.5"/>
    <path d="M13,10 Q11,9 10,11"/>
    <path d="M13,10 Q11.5,7.5 11,9"/>
    <path d="M16,9 Q14,8 13,10"/>
    <path d="M16,9 Q15,6.5 14.5,8"/>
    <path d="M19,10 Q20.5,7.5 20,9"/>
    <path d="M19,10 Q21,9 22,11"/>
    <path d="M22,11 Q23,9 23.5,10.5"/>
    <path d="M22,11 Q24,10 24.5,12"/>
  </g>
  <!-- Small grain dots on panicle tips -->
  <g fill="#c8a832" opacity="0.7">
    <circle cx="7" cy="12" r="0.5"/>
    <circle cx="8" cy="10.5" r="0.5"/>
    <circle cx="10" cy="11" r="0.5"/>
    <circle cx="11" cy="9" r="0.5"/>
    <circle cx="13" cy="10" r="0.5"/>
    <circle cx="14.5" cy="8" r="0.5"/>
    <circle cx="20" cy="9" r="0.5"/>
    <circle cx="22" cy="11" r="0.5"/>
    <circle cx="23.5" cy="10.5" r="0.5"/>
    <circle cx="24.5" cy="12" r="0.5"/>
  </g>
  <!-- Dried narrow leaves -->
  <path d="M13,20 Q10,19 8.5,20" fill="none" stroke="#b8a040" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M19,19 Q22,18 23.5,19" fill="none" stroke="#b8a040" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Highlight on left panicles -->
  <path d="M14,8.5 Q13,7 12,8.5" fill="none" stroke="#d8c050" stroke-width="0.3" opacity="0.5"/>
</svg>
