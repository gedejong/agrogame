name: Godot CI

on:
  push:
    branches: [ main, develop, 'feat/**' ]
    paths:
      - 'game/**'
      - '.github/workflows/godot.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'game/**'
      - '.github/workflows/godot.yml'

env:
  GODOT_VERSION: "4.6.1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: Lint GDScript
        run: gdlint game/scripts/*.gd game/tests/unit/*.gd

      - name: Check GDScript formatting
        run: gdformat --check game/scripts/*.gd game/tests/unit/*.gd

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file-level test coverage (100%)
        run: bash game/tests/check_coverage.sh 100

  test:
    runs-on: ubuntu-latest
    needs: [lint, coverage]
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        id: install-godot
        uses: chickensoft-games/setup-godot@v3
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Regenerate Godot class DB
        run: godot --editor --headless --quit || true
        working-directory: game

      - name: Run GUT tests
        run: godot --headless --script addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json
        working-directory: game
        timeout-minutes: 5

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Verify Godot project files
        run: |
          test -f game/project.godot
          test -f game/scenes/main.tscn
          test -f game/scripts/main.gd
          test -f game/scripts/api_client.gd
          test -f game/.gutconfig.json
          echo "All Godot project files present"
