name: Godot CI

on:
  push:
    branches: [ main, develop, 'feat/**' ]
    paths:
      - 'game/**'
      - '.github/workflows/godot.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'game/**'
      - '.github/workflows/godot.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: Lint GDScript
        run: gdlint game/scripts/*.gd

      - name: Check GDScript formatting
        run: gdformat --check game/scripts/*.gd

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: false

      - name: Verify Godot project
        run: |
          cd game
          godot --headless --quit 2>&1 || true

      - name: Run GDScript tests
        run: |
          cd game
          godot --headless --script res://tests/test_api_client.gd 2>&1
