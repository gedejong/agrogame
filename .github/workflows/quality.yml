name: Quality

on:
  pull_request:
  push:
    branches:
      - develop
      - 'feat/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-quality-${{ runner.os }}-py3.10-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-quality-${{ runner.os }}-py3.10-

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.10-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.10-

      - name: Install dependencies (with dev)
        run: poetry install --with dev

      - name: Run pre-commit (push stage)
        run: poetry run pre-commit run --all-files --hook-stage push

      - name: Import Linter
        run: poetry run lint-imports --config .importlinter

      - name: Xenon complexity
        run: poetry run xenon --max-average B --max-modules B --max-absolute C --ignore 'tests/*,docs/*,out/*' --exclude 'agrogame/plots/*' agrogame

      - name: Knowledge-base coverage (#295)
        run: poetry run python scripts/check_docs_coverage.py

      - name: Canonical class docstrings (#296)
        run: poetry run python scripts/check_class_docstrings.py

      - name: Interrogate docstring coverage (#296)
        run: poetry run interrogate agrogame

      - name: Deptry dependency hygiene
        run: poetry run deptry agrogame

      - name: Vulture (report-only)
        run: poetry run vulture agrogame --min-confidence 80
