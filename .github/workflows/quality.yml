name: Quality

on:
  pull_request:
  push:
    branches:
      - develop
      - 'feat/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies (with dev)
        run: poetry install --with dev

      - name: Run pre-commit (push stage)
        run: poetry run pre-commit run --all-files --hook-stage push

      - name: Import Linter
        run: poetry run lint-imports --path . --config .importlinter

      - name: Xenon complexity
        run: poetry run xenon --max-average B --max-modules B --max-absolute C --ignore tests/*,docs/*,out/* agrogame
        continue-on-error: true

      - name: Deptry dependency hygiene
        run: poetry run deptry . --exclude tests,docs,build,dist,out
        continue-on-error: true

      - name: Vulture (report-only)
        run: poetry run vulture agrogame --min-confidence 80
        continue-on-error: true

