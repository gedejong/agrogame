name: Python CI

on:
  push:
    branches: [ main, develop, 'feat/**' ]
    paths:
      - 'agrogame/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/python.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'agrogame/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/python.yml'
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '2.1.3'
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-test-${{ runner.os }}-py3.10-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-test-${{ runner.os }}-py3.10-
      - name: Configure Poetry
        run: poetry config virtualenvs.create true
      - name: Install dependencies
        run: poetry install --no-interaction --with dev
      - name: Run tests with coverage
        run: poetry run pytest
      - name: Check formatting (Black)
        run: poetry run black --check .
      - name: Lint (Flake8)
        run: poetry run flake8 .
      - name: Lint (Ruff - general)
        run: poetry run ruff check .
      - name: Lint (Ruff - docstrings water package)
        run: poetry run ruff check agrogame/soil/water --select D
      - name: Type check (MyPy)
        run: poetry run mypy agrogame

  test_full_matrix:
    if: github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '2.1.3'
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-matrix-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-matrix-${{ runner.os }}-py${{ matrix.python-version }}-
      - name: Configure Poetry
        run: poetry config virtualenvs.create true
      - name: Install dependencies
        run: poetry install --no-interaction --with dev
      - name: Run tests with coverage
        run: poetry run pytest
      - name: Check formatting (Black)
        run: poetry run black --check .
      - name: Lint (Flake8)
        run: poetry run flake8 .
      - name: Lint (Ruff - general)
        run: poetry run ruff check .
      - name: Lint (Ruff - docstrings water package)
        run: poetry run ruff check agrogame/soil/water --select D
      - name: Type check (MyPy)
        run: poetry run mypy agrogame

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '2.1.3'
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-docs-${{ runner.os }}-py3.11-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-docs-${{ runner.os }}-py3.11-
      - name: Configure Poetry
        run: poetry config virtualenvs.create true
      - name: Install dependencies (with docs)
        run: poetry install --no-interaction --with dev
      - name: Build docs
        run: poetry run mkdocs build --strict
