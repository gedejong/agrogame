site_name: AgroGame Docs
repo_url: https://github.com/databuildcompany/agrogame
repo_name: databuildcompany/agrogame
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Quick Context:
      - Water: water.md
      - Weather System: weather.md
      - ET (PT/PM + VPD): et.md
      - Evaporation & Residue: evaporation-residue.md
      - Interception: interception.md
      - Nitrogen: nitrogen.md
      - Phosphorus: phosphorus.md
      - Microbial: microbial.md
      - Microbial Tutorial: microbial_tutorial.md
      - Phenology: phenology.md
      - Canopy: canopy.md
      - Diagnostics & Plots: plots.md
      - Dashboard: dashboard.md
      - Events & Debugging: events.md
      - Architecture (compressed): architecture.md
      - Quality Bar: quality-bar.md
  - Architecture:
      - Overview: architecture/overview.md
      - Soil Module: architecture/soil-module.md
      - Water Model Abstraction: architecture/water_model_abstraction.md
      - Plant Module: architecture/plant-module.md
      - Data Flow: architecture/data-flow.md
      - Ports & Events: architecture/ports-and-events.md
      - Event-driven Scheduling: architecture/event-driven-scheduling.md
  - Models:
      - Water Balance: models/water-balance.md
      - Nutrient Cycle: models/nutrient-cycle.md
      - Crop Growth: models/crop-growth.md
  - ADRs:
      - Game State Persistence: adr/ADR-001-game-state-persistence.md
      - Multi-field Architecture: adr/ADR-002-multi-field-architecture.md
      - Economic Model: adr/ADR-003-economic-model.md
      - Game Loop & Turns: adr/ADR-004-game-loop-turn-system.md
      - Frontend Architecture: adr/ADR-005-frontend-architecture.md
      - Performance Strategy: adr/ADR-006-performance-strategy.md
  - Validation: validation.md
  - Research: research-correctness.md
  - Configuration: configuration.md
  - Contributing: contributing.md
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - search.highlight
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
plugins:
  - search
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
